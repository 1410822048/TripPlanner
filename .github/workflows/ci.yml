# Minimal CI: every push to any branch + every PR runs the four checks
# the pre-commit hook can't (or shouldn't) run on the developer's machine —
# typecheck, full test suite, full build. Lint is duplicated from
# pre-commit so PRs from contributors without our husky setup still
# get checked.
name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    # 15 (not 10): the rules step pulls firebase-tools via npx + downloads the
    # Firestore emulator jar + boots the JVM before any test runs.
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # `--legacy-peer-deps` because vite-plugin-pwa hasn't published a
      # version that pins to vite@8 yet; the resolution still works at
      # runtime. Drop the flag once the upstream peer range is updated.
      - name: Install
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      # Root `npm test` only scans src/** + packages/**; the Worker has its
      # own vitest config (Cloudflare Workers pool) and lives outside that
      # glob. Without this step the Worker's ~350-test suite would never run
      # in CI, which is the exact silent-gap class the root glob comment warns
      # against. Keep this in sync with the Worker test command in CLAUDE.md.
      - name: Test (Worker)
        working-directory: workers/ocr
        run: npx vitest run

      # firebase-functions has its own vitest config and lives outside the
      # root glob (src/** + packages/**), same as the Worker above. Typecheck
      # already covers it via `npm run typecheck` (--workspaces), but the test
      # run does not — without this step the push dispatch/normalize/send
      # suite never executes in CI.
      - name: Test (functions)
        run: npm run functions:test

      # The rules suite runs against the Firestore emulator, which needs a JVM.
      # This is exactly the kind of check that shouldn't require every dev to
      # install a JDK locally — CI is the environment that has Java.
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Test (rules)
        run: npm run test:rules

      - name: Build
        run: npm run build
        env:
          # The Firebase config is read from import.meta.env at build time.
          # CI doesn't deploy, so feed it placeholders that satisfy
          # firebase.ts:33 fail-fast validation. Real values are set per
          # environment in the deploy pipeline.
          VITE_FIREBASE_API_KEY: ci-placeholder
          VITE_FIREBASE_AUTH_DOMAIN: ci.example.com
          VITE_FIREBASE_PROJECT_ID: ci-placeholder
          VITE_FIREBASE_STORAGE_BUCKET: ci-placeholder.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID: '0'
          VITE_FIREBASE_VAPID_KEY: ci-placeholder
          VITE_FIREBASE_APP_ID: '0:ci'
